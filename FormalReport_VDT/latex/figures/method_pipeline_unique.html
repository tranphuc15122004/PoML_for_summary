<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Method Figure</title>
  <style>
    html, body {
      margin: 0;
      background: #efe8dc;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .frame {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    .board {
      background: #fcfaf5;
      border: 1px solid #d7cabb;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(54, 40, 24, 0.10);
      overflow: hidden;
    }

    .caption {
      padding: 14px 22px 0;
      color: #5a5147;
      font-size: 13px;
      line-height: 1.4;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      fill: #1e293b;
    }

    .subtitle {
      font-size: 14px;
      fill: #6b7280;
    }

    .lane-label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      fill: #6d5c43;
    }

    .box-title {
      font-size: 19px;
      font-weight: 700;
      fill: #18212c;
    }

    .box-text {
      font-size: 13px;
      fill: #51606f;
    }

    .mini {
      font-size: 12px;
      fill: #5f6b76;
    }

    .tiny {
      font-size: 11px;
      fill: #6b7280;
    }

    .formula {
      font-size: 15px;
      font-weight: 700;
      fill: #6a4412;
    }

    .token {
      font-size: 12px;
      font-weight: 700;
    }

    .shadow {
      filter: drop-shadow(0 10px 16px rgba(86, 64, 41, 0.08));
    }

    @media (max-width: 900px) {
      .frame {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="board">
      <svg viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
        <title id="title">Project-specific SFT and GRPO pipeline</title>
        <desc id="desc">A compact XML/SVG figure showing the project method with SFT, GRPO, custom loss, and anti reward hacking safeguards.</desc>

        <defs>
          <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff5e8" />
            <stop offset="100%" stop-color="#f8fbff" />
          </linearGradient>
          <linearGradient id="orangeBox" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff0e7" />
            <stop offset="100%" stop-color="#ffe1cf" />
          </linearGradient>
          <linearGradient id="blueBox" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ebf6ff" />
            <stop offset="100%" stop-color="#d6ecff" />
          </linearGradient>
          <linearGradient id="greenBox" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#edf9f1" />
            <stop offset="100%" stop-color="#d8f0df" />
          </linearGradient>
          <linearGradient id="goldBox" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff8df" />
            <stop offset="100%" stop-color="#f7ebbc" />
          </linearGradient>
          <linearGradient id="roseBox" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff0f1" />
            <stop offset="100%" stop-color="#ffd9de" />
          </linearGradient>
          <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
            <path d="M0,0 L14,7 L0,14 z" fill="#8b7355" />
          </marker>
          <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
            <path d="M0,0 L14,7 L0,14 z" fill="#2e6f9c" />
          </marker>
          <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
            <path d="M0,0 L14,7 L0,14 z" fill="#9b4650" />
          </marker>
        </defs>

        <rect x="0" y="0" width="1600" height="980" fill="url(#bgGlow)" />
        <circle cx="210" cy="80" r="180" fill="#f7d7bf" opacity="0.22" />
        <circle cx="1410" cy="120" r="180" fill="#d8ebfb" opacity="0.28" />

        <text x="48" y="58" class="title">Method Overview: not generic SFT→RL, but a safeguarded controllable summarization pipeline</text>
        <text x="48" y="86" class="subtitle">Reference-conditioned prompts, SFT warm-start, custom GRPO update, and anti-reward-hacking design</text>

        <text x="52" y="146" class="lane-label">Input Design</text>
        <text x="52" y="404" class="lane-label">Supervised Stage</text>
        <text x="52" y="690" class="lane-label">Alignment Stage</text>

        <g class="shadow">
          <rect x="48" y="168" rx="26" ry="26" width="280" height="160" fill="url(#goldBox)" stroke="#d8c690" stroke-width="2" />
          <text x="76" y="214" class="box-title">Prompt Builder</text>
          <text x="76" y="244" class="box-text">source x + reference y*</text>
          <text x="76" y="266" class="box-text">derive length + sentence control</text>
          <text x="76" y="288" class="box-text">chat prompt format</text>
          <rect x="76" y="300" rx="12" ry="12" width="90" height="26" fill="#fff7e7" stroke="#d6b76c" />
          <text x="92" y="318" class="token" fill="#7b5a14">approx</text>
          <rect x="174" y="300" rx="12" ry="12" width="72" height="26" fill="#fff7e7" stroke="#d6b76c" />
          <text x="195" y="318" class="token" fill="#7b5a14">range</text>
          <rect x="252" y="300" rx="12" ry="12" width="50" height="26" fill="#fff7e7" stroke="#d6b76c" />
          <text x="265" y="318" class="token" fill="#7b5a14">max</text>
        </g>

        <g class="shadow">
          <rect x="382" y="168" rx="26" ry="26" width="352" height="160" fill="url(#orangeBox)" stroke="#e4b293" stroke-width="2" />
          <text x="410" y="214" class="box-title">SFT Data View</text>
          <text x="410" y="244" class="box-text">system + user + assistant</text>
          <text x="410" y="266" class="box-text">cleaner supervision</text>
          <text x="410" y="288" class="box-text">short VietNews titles filtered</text>
          <rect x="410" y="300" rx="14" ry="14" width="158" height="28" fill="#fff7f2" stroke="#dda17f" />
          <text x="427" y="319" class="token" fill="#8d4621">SFT only uses approx prompts</text>
        </g>

        <g class="shadow">
          <rect x="788" y="168" rx="26" ry="26" width="352" height="160" fill="url(#blueBox)" stroke="#99c2e4" stroke-width="2" />
          <text x="816" y="214" class="box-title">GRPO Data View</text>
          <text x="816" y="244" class="box-text">assistant answer removed</text>
          <text x="816" y="266" class="box-text">broader training pool</text>
          <text x="816" y="288" class="box-text">prompt wording diversified</text>
          <rect x="816" y="300" rx="14" ry="14" width="186" height="28" fill="#f5fbff" stroke="#88b6dc" />
          <text x="835" y="319" class="token" fill="#225d87">approx / range / max rotation</text>
        </g>

        <g class="shadow">
          <rect x="1194" y="168" rx="26" ry="26" width="358" height="160" fill="#fffdfa" stroke="#d8cabb" stroke-width="2" />
          <text x="1222" y="214" class="box-title">Qwen3 Setup</text>
          <text x="1222" y="244" class="box-text">LoRA adaptation on Qwen3-4B</text>
          <text x="1222" y="266" class="box-text">thinking mode disabled</text>
          <text x="1222" y="288" class="box-text">Base and Instruct families</text>
          <rect x="1222" y="300" rx="14" ry="14" width="170" height="28" fill="#f7fafc" stroke="#cfd7df" />
          <text x="1245" y="319" class="token" fill="#3e4b59">same prompt schema shared</text>
        </g>

        <path d="M328 248 L382 248" stroke="#8b7355" stroke-width="4" fill="none" marker-end="url(#arrow)" />
        <path d="M734 248 L788 248" stroke="#8b7355" stroke-width="4" fill="none" marker-end="url(#arrow)" />
        <path d="M1140 248 L1194 248" stroke="#8b7355" stroke-width="4" fill="none" marker-end="url(#arrow)" />

        <g class="shadow">
          <rect x="80" y="434" rx="28" ry="28" width="490" height="176" fill="url(#orangeBox)" stroke="#e4b293" stroke-width="2" />
          <text x="114" y="482" class="box-title">SFT</text>
          <text x="114" y="510" class="box-text">Teach summarization + control following</text>
          <text x="114" y="538" class="box-text">LoRA r=32, alpha=32, dropout=0.05</text>
          <text x="114" y="566" class="box-text">3072 tokens, 2 epochs, LR 5e-5</text>
          <rect x="114" y="584" rx="16" ry="16" width="178" height="30" fill="#fff7f2" stroke="#dda17f" />
          <text x="136" y="604" class="token" fill="#8d4621">largest quality jump</text>
          <rect x="304" y="584" rx="16" ry="16" width="170" height="30" fill="#fff7f2" stroke="#dda17f" />
          <text x="330" y="604" class="token" fill="#8d4621">warm-start for GRPO</text>
        </g>

        <g class="shadow">
          <rect x="664" y="392" rx="30" ry="30" width="842" height="308" fill="url(#blueBox)" stroke="#99c2e4" stroke-width="2" />
          <text x="700" y="438" class="box-title">Custom GRPO Loop</text>

          <rect x="700" y="470" rx="20" ry="20" width="176" height="86" fill="#f7fbff" stroke="#8db8dd" />
          <text x="725" y="505" class="token" fill="#235d87">Rollout K completions</text>
          <text x="725" y="528" class="mini">v5: K = 8</text>
          <text x="725" y="546" class="mini">dropout off at decode</text>

          <rect x="912" y="470" rx="20" ry="20" width="176" height="86" fill="#f7fbff" stroke="#8db8dd" />
          <text x="938" y="505" class="token" fill="#235d87">Group rewards</text>
          <text x="938" y="528" class="mini">R_acc, R_len, R_sent</text>
          <text x="938" y="546" class="mini">per prompt group</text>

          <rect x="1124" y="470" rx="20" ry="20" width="176" height="86" fill="#f7fbff" stroke="#8db8dd" />
          <text x="1148" y="505" class="token" fill="#235d87">Advantage norm</text>
          <text x="1148" y="528" class="mini">(r - mean) / max(std, 0.01)</text>
          <text x="1148" y="546" class="mini">within each prompt</text>

          <rect x="1336" y="470" rx="20" ry="20" width="136" height="86" fill="#f7fbff" stroke="#8db8dd" />
          <text x="1360" y="505" class="token" fill="#235d87">Update</text>
          <text x="1360" y="528" class="mini">clipped PG</text>
          <text x="1360" y="546" class="mini">+ token KL</text>

          <path d="M876 513 L912 513" stroke="#2e6f9c" stroke-width="4" fill="none" marker-end="url(#arrowBlue)" />
          <path d="M1088 513 L1124 513" stroke="#2e6f9c" stroke-width="4" fill="none" marker-end="url(#arrowBlue)" />
          <path d="M1300 513 L1336 513" stroke="#2e6f9c" stroke-width="4" fill="none" marker-end="url(#arrowBlue)" />

          <rect x="700" y="588" rx="20" ry="20" width="446" height="78" fill="#fff8e6" stroke="#d7c278" />
          <text x="726" y="622" class="formula">L = L_policy + beta * KL(policy || frozen initial policy)</text>
          <text x="726" y="645" class="mini">reference anchor = base for fresh, base+SFT for warm-start</text>

          <rect x="1172" y="588" rx="20" ry="20" width="300" height="78" fill="#edf9f1" stroke="#9cc7aa" />
          <text x="1198" y="622" class="token" fill="#286246">Why it is project-specific</text>
          <text x="1198" y="645" class="mini">custom trainer, not stock TRL.GRPOTrainer</text>
        </g>

        <path d="M570 522 L664 522" stroke="#8b7355" stroke-width="5" fill="none" marker-end="url(#arrow)" />
        <path d="M570 560 C608 560, 620 606, 664 606" stroke="#8b7355" stroke-width="3" fill="none" stroke-dasharray="8 7" marker-end="url(#arrow)" />
        <text x="586" y="548" class="tiny">preferred path: SFT-init</text>
        <text x="586" y="586" class="tiny">ablation path: fresh GRPO</text>

        <g class="shadow">
          <rect x="64" y="734" rx="30" ry="30" width="466" height="188" fill="url(#roseBox)" stroke="#e0aab2" stroke-width="2" />
          <text x="98" y="782" class="box-title">Anti-Reward-Hacking Design</text>
          <rect x="98" y="806" rx="18" ry="18" width="116" height="34" fill="#fff5f6" stroke="#d9929c" />
          <text x="120" y="828" class="token" fill="#893740">decode</text>
          <rect x="226" y="806" rx="18" ry="18" width="116" height="34" fill="#fff5f6" stroke="#d9929c" />
          <text x="245" y="828" class="token" fill="#893740">detect</text>
          <rect x="354" y="806" rx="18" ry="18" width="130" height="34" fill="#fff5f6" stroke="#d9929c" />
          <text x="377" y="828" class="token" fill="#893740">gate</text>
          <text x="98" y="868" class="box-text">1. keep repetition_penalty = 1.0 and no_repeat_ngram_size = 0</text>
          <text x="98" y="892" class="box-text">2. _is_degenerate() zeros constraint bonuses on garbage outputs</text>
        </g>

        <g class="shadow">
          <rect x="574" y="734" rx="30" ry="30" width="468" height="188" fill="url(#goldBox)" stroke="#d8c690" stroke-width="2" />
          <text x="608" y="782" class="box-title">Reward Geometry</text>
          <text x="608" y="826" class="formula">R_total = R_acc * (1 + 0.3 R_len + 0.2 R_sent)</text>
          <text x="608" y="858" class="box-text">content quality must exist before control reward can help</text>
          <text x="608" y="882" class="box-text">max-length prompts also enforce a minimum output floor</text>
        </g>

        <g class="shadow">
          <rect x="1086" y="734" rx="30" ry="30" width="450" height="188" fill="url(#greenBox)" stroke="#9cc7aa" stroke-width="2" />
          <text x="1120" y="782" class="box-title">Paper Message</text>
          <text x="1120" y="826" class="box-text">SFT = major capability gain</text>
          <text x="1120" y="850" class="box-text">GRPO = control refinement + failure mitigation</text>
          <text x="1120" y="874" class="box-text">best recipe = SFT-init GRPO v5</text>
        </g>

        <path d="M530 828 L574 828" stroke="#9b4650" stroke-width="4" fill="none" marker-end="url(#arrowRed)" />
        <path d="M1042 828 L1086 828" stroke="#8b7355" stroke-width="4" fill="none" marker-end="url(#arrow)" />
      </svg>
      <div class="caption">This draft uses inline SVG (XML) so the figure behaves like an actual drawn diagram rather than a text-heavy HTML summary. It is intentionally more visual, with fewer words and clearer spatial grouping.</div>
    </div>
  </div>
</body>
</html>
